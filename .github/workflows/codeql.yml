name: 'CodeQL Advanced'

# Reusable CodeQL scan, chained from ci.yml (needs lint + verify) and run weekly on a
# schedule. Scans the repo's first-party code: the GitHub Actions workflows and the
# Node app. No Ruby — the Jekyll docs pipeline was retired (docs live in
# hyperweaver-docs), so there's no first-party Ruby source.

on:
  schedule:
    - cron: '32 5 * * 4'
  workflow_call:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'
